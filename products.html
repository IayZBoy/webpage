<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - ZBoy's Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @font-face {
      font-family: "Winner Sans Bold";
      src: url("./images/winner-sans-bold.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #080b10;
      --bg2: #0d1117;
      --bg3: #131920;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.07);
      --border-accent: rgba(0, 212, 255, 0.3);
      --accent: #00d4ff;
      --accent2: #0099cc;
      --accent-glow: rgba(0, 212, 255, 0.15);
      --text: #f0f4f8;
      --text2: #8ba0b4;
      --text3: #4a6070;
      --green: #00e599;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 2rem;
      height: 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: rgba(8, 11, 16, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: "Winner Sans Bold", sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-self: start;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 800;
      color: var(--bg);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
      justify-self: center;
    }

    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 0.875rem;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
      background: var(--surface);
    }

    /* small → scale */
    .nav-cart {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem 1rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      justify-self: end;
    }

    .nav-cart:hover {
      border-color: var(--border-accent);
      background: var(--accent-glow);
      transform: scale(1.06);
    }

    .nav-cart:active {
      transform: scale(0.94);
    }

    .cart-badge {
      background: var(--accent);
      color: var(--bg);
      font-size: 0.625rem;
      font-weight: 700;
      border-radius: 6px;
      padding: 1px 5px;
      font-family: 'DM Mono', monospace;
      display: none;
    }

    .cart-badge.visible {
      display: inline;
    }

    .page-header {
      padding: 120px 2rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-header h1 {
      font-family: "Winner Sans Bold", sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--text2);
      font-size: 0.9375rem;
    }

    .filter-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    /* small → scale */
    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 99px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;
    }

    .filter-chip:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.15);
      transform: scale(1.07);
    }

    .filter-chip:active {
      transform: scale(0.93);
    }

    .filter-chip.active {
      background: var(--accent-glow);
      border-color: var(--border-accent);
      color: var(--accent);
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      padding: 0.45rem 1rem 0.45rem 2.25rem;
      border-radius: 10px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder {
      color: var(--text3);
    }

    .search-input:focus {
      border-color: var(--border-accent);
    }

    .search-icon {
      position: absolute;
      left: 0.625rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }

    .products-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
      position: relative;
      z-index: 1;
    }

    .results-count {
      font-size: 0.8125rem;
      color: var(--text3);
      margin-bottom: 1.25rem;
      font-family: 'DM Mono', monospace;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .product-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-accent);
    }

    .product-img-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--bg3) 0%, rgba(0, 212, 255, 0.05) 100%);
      overflow: hidden;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-body {
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-tags {
      display: flex;
      gap: 0.375rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.67rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 5px;
    }

    .tag-category {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text3);
    }

    .tag-status {
      background: rgba(0, 229, 153, 0.1);
      color: var(--green);
    }

    .tag-hot {
      background: rgba(255, 71, 87, 0.1);
      color: #ff4757;
    }

    .tag-new {
      background: rgba(0, 212, 255, 0.1);
      color: var(--accent);
    }

    .product-name {
      font-family: "Winner Sans Bold", sans-serif;
      font-size: 1.0625rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
      line-height: 1.3;
      letter-spacing: 0.05em;
    }

    .product-desc {
      font-size: 0.8125rem;
      color: var(--text2);
      line-height: 1.55;
      flex: 1;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.875rem;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .product-price {
      font-family: 'DM Mono', monospace;
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--text);
    }

    .card-actions {
      display: flex;
      gap: 0.375rem;
    }

    /* small → scale */
    .btn-view {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.375rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: color 0.15s, border-color 0.15s, transform 0.15s;
    }

    .btn-view:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.15);
      transform: scale(1.08);
    }

    .btn-view:active {
      transform: scale(0.92);
    }

    /* small → scale */
    .btn-add {
      background: var(--accent-glow);
      border: 1px solid var(--border-accent);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.375rem 0.875rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-add:hover {
      background: rgba(0, 212, 255, 0.22);
      transform: scale(1.08);
    }

    .btn-add:active {
      transform: scale(0.92);
    }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text3);
    }

    .empty-state-icon {
      width: 52px;
      height: 52px;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    .empty-state h3 {
      font-family: "Winner Sans Bold", sans-serif;
      font-size: 1.25rem;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg3);
      border: 1px solid var(--border-accent);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--text3);
      font-size: 0.8rem;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 640px) {
      nav {
        padding: 0 1rem;
      }

      .nav-links {
        display: none;
      }

      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .search-wrap {
        margin-left: 0;
        width: 100%;
      }

      .search-input {
        width: 100%;
      }

      .filter-bar {
        padding: 0 1rem 1.5rem;
      }

      .products-section {
        padding: 0 1rem 3rem;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">Z</div>
      ZBoy's <span>Shop</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="shoppingcart.html">Cart</a></li>
    </ul>
    <a href="shoppingcart.html" class="nav-cart">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.58h9.72a2 2 0 0 0 2-1.57l1.38-7.39H5.12" />
      </svg>
      Cart
      <span class="cart-badge" id="nav-badge">0</span>
    </a>
  </nav>

  <div class="page-header">
    <h1>All Products</h1>
    <p>Instant delivery on every purchase. Browse our full catalog below.</p>
  </div>

  <div class="filter-bar">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="popular">Popular</button>
    <button class="filter-chip" data-filter="new">New</button>
    <button class="filter-chip" data-filter="budget">Budget</button>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" class="search-input" id="search" placeholder="Search products..." />
    </div>
  </div>

  <div class="products-section">
    <div class="results-count" id="results-count"></div>
    <div class="products-grid" id="products-grid"></div>
  </div>

  <footer>
    <p>© 2026 ZBoy Inc. All rights reserved. · <a href="products.html"
        style="color:var(--accent);text-decoration:none;">Products</a> · <a href="shoppingcart.html"
        style="color:var(--accent);text-decoration:none;">Cart</a></p>
  </footer>

  <div id="toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
    <span id="toast-msg">Added to cart!</span>
  </div>

  <script>
    const PRODUCTS = [
      { id: 1, name: "Product Alpha", price: 9.99, category: "popular", tag: "Best Seller", tagType: "tag-hot", desc: "Top-rated product with instant delivery and premium support included.", image: "images/products/product-1.svg" },
      { id: 2, name: "Product Beta", price: 14.99, category: "popular", tag: "Hot", tagType: "tag-hot", desc: "High demand item. Trusted by thousands of customers worldwide.", image: "images/products/product-2.svg" },
      { id: 3, name: "Product Gamma", price: 7.49, category: "popular", tag: "Popular", tagType: "tag-status", desc: "Community favorite. Great value for the features provided.", image: "images/products/product-3.svg" },
      { id: 4, name: "Product Delta", price: 19.99, category: "popular", tag: "Premium", tagType: "tag-status", desc: "Enhanced edition with all features unlocked and lifetime updates.", image: "images/products/product-4.svg" },
      { id: 5, name: "Product Epsilon", price: 24.99, category: "popular", tag: "Elite", tagType: "tag-status", desc: "Top-tier product for power users who need maximum performance.", image: "images/products/product-5.svg" },
      { id: 11, name: "New Release X", price: 12.99, category: "new", tag: "New", tagType: "tag-new", desc: "Brand new arrival. Be among the first to get it at launch price.", image: "images/products/product-11.svg" },
      { id: 12, name: "New Release Y", price: 16.99, category: "new", tag: "New", tagType: "tag-new", desc: "Latest addition to our catalog. Limited launch pricing available.", image: "images/products/product-12.svg" },
      { id: 13, name: "New Release Z", price: 8.99, category: "new", tag: "New", tagType: "tag-new", desc: "Fresh drop at an accessible price point. Don't miss launch week.", image: "images/products/product-13.svg" },
      { id: 21, name: "Budget Pick A", price: 2.99, category: "budget", tag: "Value", tagType: "tag-category", desc: "Great quality at an unbeatable price. Perfect for getting started.", image: "images/products/product-21.svg" },
      { id: 22, name: "Budget Pick B", price: 4.99, category: "budget", tag: "Value", tagType: "tag-category", desc: "Affordable option without compromising on quality or delivery speed.", image: "images/products/product-22.svg" },
      { id: 23, name: "Budget Pick C", price: 1.99, category: "budget", tag: "Cheapest", tagType: "tag-category", desc: "Entry-level option perfect for trying out our service risk-free.", image: "images/products/product-23.svg" },
    ];

    let activeFilter = 'all';
    let searchQuery = '';

    function getCart() { return JSON.parse(localStorage.getItem('zboyCart') || '[]'); }
    function saveCart(c) { localStorage.setItem('zboyCart', JSON.stringify(c)); }

    function addToCart(id) {
      const product = PRODUCTS.find(p => p.id === id);
      if (!product) return;
      const cart = getCart();
      const existing = cart.find(i => i.id === id);
      if (existing) existing.qty++;
      else cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
      saveCart(cart);
      updateBadge();
      showToast(`${product.name} added!`);
    }

    function updateBadge() {
      const cart = getCart();
      const count = cart.reduce((a, i) => a + i.qty, 0);
      const badge = document.getElementById('nav-badge');
      if (!badge) return;
      badge.textContent = count;
      badge.classList.toggle('visible', count > 0);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function renderProducts() {
      let filtered = PRODUCTS;
      if (activeFilter !== 'all') filtered = filtered.filter(p => p.category === activeFilter);
      if (searchQuery) filtered = filtered.filter(p =>
        p.name.toLowerCase().includes(searchQuery) || p.desc.toLowerCase().includes(searchQuery)
      );

      const grid = document.getElementById('products-grid');
      const count = document.getElementById('results-count');
      count.textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <img src="images/icons/empty-search.svg" alt="No products found" class="empty-state-icon"/>
          <h3>No products found</h3>
          <p>Try adjusting your search or filter.</p>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="product-card">
          <a href="product.html?id=${p.id}" style="text-decoration:none">
            <div class="product-img-placeholder"><img src="${p.image}" alt="${p.name}" class="product-img"/></div>
          </a>
          <div class="product-body">
            <div class="product-tags">
              <span class="tag tag-category">${p.category}</span>
              <span class="tag ${p.tagType}">${p.tag}</span>
            </div>
            <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit">
              <div class="product-name">${p.name}</div>
            </a>
            <div class="product-desc">${p.desc}</div>
            <div class="product-footer">
              <div class="product-price">€${p.price.toFixed(2)}</div>
              <div class="card-actions">
                <a href="product.html?id=${p.id}" class="btn-view">View</a>
                <button class="btn-add" onclick="addToCart(${p.id})">+ Add</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderProducts();
      });
    });

    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase().trim();
      renderProducts();
    });

    renderProducts();
    updateBadge();
  </script>
</body>

</html>
